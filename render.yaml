services:
  - type: web
    name: kia-extensiones-api
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: ULTRAMSG_INSTANCE
        sync: false
      - key: ULTRAMSG_TOKEN
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
